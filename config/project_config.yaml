project_name: gcp-retail-data-pipeline

source_data_path: data/simulated_sftp

# Full load is one-time/manual
full_load_date: 20260501

# DAILY = generate current date delta files
# FIXED_DATES = generate dates from incremental_dates list
incremental_date_mode: CURRENT_DATE

# 0 = today
# 1 = yesterday
incremental_days_back: 0

# Used only when incremental_date_mode = FIXED_DATES
incremental_dates:
  - 20260502
  - 20260503
  - 20260504
  - 20260505
  - 20260506

# Base full load counts
record_counts:
  customers_full: 5000
  products_full: 1000
  stores_full: 100
  sales_full: 50000

# Dynamic delta volume rules
# These are ranges. Generator will pick count between min and max.
dynamic_delta_record_counts:
  weekday:
    customers_delta_min: 250
    customers_delta_max: 450
    products_delta_min: 80
    products_delta_max: 130
    stores_delta_min: 5
    stores_delta_max: 10
    sales_delta_min: 4000
    sales_delta_max: 7000

  weekend:
    customers_delta_min: 500
    customers_delta_max: 900
    products_delta_min: 120
    products_delta_max: 200
    stores_delta_min: 8
    stores_delta_max: 15
    sales_delta_min: 10000
    sales_delta_max: 18000

  month_end:
    customers_delta_min: 700
    customers_delta_max: 1200
    products_delta_min: 150
    products_delta_max: 250
    stores_delta_min: 10
    stores_delta_max: 20
    sales_delta_min: 15000
    sales_delta_max: 25000

  festival:
    customers_delta_min: 1000
    customers_delta_max: 2000
    products_delta_min: 200
    products_delta_max: 400
    stores_delta_min: 15
    stores_delta_max: 30
    sales_delta_min: 30000
    sales_delta_max: 60000

# Optional festival / sale dates
# Format: YYYYMMDD
festival_dates:
  - 20260615
  - 20260815
  - 20261020
  - 20261101

gcp:
  project_id: still-resource-497715-g5
  region: asia-south1

gcs:
  landing_bucket: retail-landing-dev-raj1779989813
  validated_bucket: retail-validated-dev-raj1779989813
  rejected_bucket: retail-rejected-dev-raj1779989813
  archive_bucket: retail-archive-dev-raj1779989813


  dq_simulation:
  enabled: true

  # Preserve valid master records and append separate invalid rows.
  append_bad_master_records: true

  # Good sales discounts cannot exceed this percentage of gross amount.
  good_sales_max_discount_pct: 0.20

  # Controlled number of intentional sales failures.
  sales_bad_records:
    null_customer_fk: 1
    invalid_customer_fk: 1
    invalid_product_fk: 1
    invalid_store_fk: 1
    invalid_quantity: 1
    invalid_sale_amount: 1
    future_sale_date: 1
    invalid_payment_method: 1
    duplicate_order_id: 1